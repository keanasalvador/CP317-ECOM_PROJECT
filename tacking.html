
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShopSphere - Track Order</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🛍️</span>
      <span class="name">ShopSphere</span>
    </div>

    <div class="right">
      <a class="linkBtn" href="index.html">Home</a>
      <a class="linkBtn" href="cart.html">Cart</a>
    </div>
  </header>

  <main class="container">
    <section class="details">
      <h2> Track Your Order </h2>
      <p> Enter your order ID to view the latest status. </p>

      <div class="checkoutForm">
        <label for="orderIdInput">Order ID</label>
        <input type="text" id="orderIdInput" placeholder="e.g. ORD-1741200000000" />
        <button id="trackBtn" class="primaryBtn">Track Order</button>
      </div>

      <p id="trackingError" class="errorText"></p>
      <div id="trackingResult" style="margin-top: 20px;"></div>
    </section>
  </main>

  <script src="tracking.js"></script>
</body>
</html>
