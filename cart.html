<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShopSphere - Cart</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🛍️</span>
      <span class="name">ShopSphere</span>
    </div>

    <div class="right">
      <a class="linkBtn" href="index.html">← Continue shopping</a>
    </div>
  </header>

  <main class="container">
    <section class="details">
      <h2>Shopping Cart</h2>
      <div id="cartList" class="cartList"></div>
      <div class="cartSummary" id="cartSummary"></div>

      <!-- UI-5 CHECKOUT SECTION START -->
      <section class="checkoutSection">
        <h2>Secure Checkout</h2>
        <p>Please enter your shipping and payment details to place your order.</p>

        <form id="checkoutForm" class="checkoutForm">
          <h3>Shipping Information</h3>

          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" required>

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>

          <label for="address">Address</label>
          <input type="text" id="address" required>

          <label for="city">City</label>
          <input type="text" id="city" required>

          <label for="postal">Postal Code</label>
          <input type="text" id="postal" required>

          <h3>Payment Information</h3>

          <label for="cardName">Name on Card</label>
          <input type="text" id="cardName" required>

          <label for="cardNumber">Card Number</label>
          <input type="text" id="cardNumber" maxlength="19" placeholder="1234 5678 9012 3456" required>

          <label for="expiry">Expiry Date</label>
          <input type="text" id="expiry" maxlength="5" placeholder="MM/YY" required>

          <label for="cvv">CVV</label>
          <input type="password" id="cvv" maxlength="4" required>

          <p id="checkoutError" class="errorText"></p>

          <button type="submit" class="primaryBtn">Place Order</button>
        </form>
      </section>
      <!-- UI-5 CHECKOUT SECTION END -->

    </section>
  </main>

  <script src="products.js"></script>
  <script src="cart-utils.js"></script>
  <script src="cart.js"></script>
</body>
</html>
